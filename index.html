<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dui</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-family: sans-serif;
            font-size: 1.2em;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist/duckdb-browser-blocking.cjs" type="text/javascript"></script>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
</head>
<body>
    <div id="loading">Loading dui...</div>
    <canvas id="the_canvas_id"></canvas>
    <script src="assets/duckdb_bridge.js"></script>
</body>
</html>
